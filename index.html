<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Higgott - Achievement Certificate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .certificate-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 25px 20px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .certificate-card:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .badge {
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 20px;
            color: #FFD700;
        }

        .certificate-img {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin: 15px 0;
            background: white;
            padding: 5px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            text-decoration: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 20px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.5);
        }

        .info-text {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.7;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
        }

        @media (max-width: 480px) {
            .certificate-card {
                padding: 20px 15px 30px;
            }
            h1 {
                font-size: 24px;
            }
            .download-btn {
                padding: 12px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="certificate-card">
    <h1>🏆 HIGGOTT 🏆</h1>
    <div class="badge">✦ ACHIEVEMENT UNLOCKED ✦</div>

    <!-- यहाँ अपनी certificate image का नाम बदलना -->
    <img id="certImage" class="certificate-img" src="certificate.png" alt="Higgott Certificate">

    <button id="downloadBtn" class="download-btn">
        ⬇️ Download Certificate
    </button>
    <div class="info-text">
        🔥 10,000 Views Completed! 🔥<br>
        आपकी उपलब्धि अब गैलरी में सेव होगी।
    </div>
</div>

<footer>
    © 2026 Higgott | All Rights Reserved
</footer>

<script>
    (function() {
        // ✅ IMAGE SOURCE (अगर image name अलग है तो यहाँ बदलना)
        const IMAGE_FILENAME = "certificate.png";
        
        // Ensure image loads properly
        const imgElement = document.getElementById('certImage');
        imgElement.src = IMAGE_FILENAME;
        
        // ✅ DOWNLOAD FUNCTION (Mobile + PC both)
        async function downloadCertificate() {
            try {
                // Try to fetch image as blob (safer for gallery save)
                const response = await fetch(IMAGE_FILENAME);
                const blob = await response.blob();
                
                // Create download link
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = "Higgott_Certificate_10K.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                // Success message
                alert("✅ Certificate downloaded!\n\n✅ It will be saved in your gallery / downloads folder.");
            } catch (error) {
                // Fallback: direct download (older method)
                const link = document.createElement('a');
                link.href = IMAGE_FILENAME;
                link.download = "Higgott_Certificate_10K.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                alert("✅ Certificate downloaded!\n\nCheck your gallery / downloads folder.");
            }
        }
        
        // Attach event to download button
        const btn = document.getElementById('downloadBtn');
        btn.addEventListener('click', downloadCertificate);
        
        // Optional: Auto download prompt (comment if not needed)
        // setTimeout(() => {
        //     if(confirm("🎉 Download your 10K achievement certificate?")) {
        //         downloadCertificate();
        //     }
        // }, 500);
    })();
</script>

</body>
</html>
